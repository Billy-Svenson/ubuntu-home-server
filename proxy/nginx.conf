###########################################################
# /home/USER/proxy/nginx.conf
# Reverse proxy for clean .home URLs (HTTP only, LAN only)
# Vaultwarden stays on https://YOUR_TAILSCALE_HOST
###########################################################

events {
    worker_connections 1024;
}

http {
    # Websocket upgrade map (used by Immich and Kuma)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------
    # immich.home → Immich photo server
    # -------------------------------------------------------
    server {
        listen 80;
        server_name immich.home;

        client_max_body_size 50000M;

        location / {
            proxy_pass http://YOUR_LAN_IP:2283;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }

    # -------------------------------------------------------
    # adguard.home → AdGuard Home dashboard
    # -------------------------------------------------------
    server {
        listen 80;
        server_name adguard.home;

        location / {
            proxy_pass http://YOUR_LAN_IP:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------
    # kuma.home → Uptime Kuma dashboard
    # -------------------------------------------------------
    server {
        listen 80;
        server_name kuma.home;

        location / {
            proxy_pass http://YOUR_LAN_IP:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # -------------------------------------------------------
    # glances.home → Glances system monitor
    # -------------------------------------------------------
    server {
        listen 80;
        server_name glances.home;

        location / {
            proxy_pass http://YOUR_LAN_IP:61208;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
