###########################################################
# /home/USER/proxy/docker-compose.yml
# Nginx reverse proxy for .home URLs
###########################################################

name: proxy
services:
  nginx-proxy:
    container_name: nginx-proxy
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # network_mode: host so nginx can reach all services
    # on YOUR_LAN_IP without Docker NAT complications.
    # Listens on port 80 for all .home domain requests.
    # NOTE: AdGuard Home must not be binding port 80 to avoid conflict.
    # Check: sudo ss -tulpn | grep :80
