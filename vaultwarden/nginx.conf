###########################################################
# /home/USER/vaultwarden/nginx.conf
# Vaultwarden reverse proxy with Websocket fix
###########################################################

events {
    worker_connections 1024;
}

http {
    # Websocket upgrade map — fixes "Websocket: Error" in diagnostics
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name YOUR_TAILSCALE_HOST;

        ssl_certificate     /certs/YOUR_TAILSCALE_HOST.crt;
        ssl_certificate_key /certs/YOUR_TAILSCALE_HOST.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 525M;

        # Main app — includes websocket upgrade headers
        location / {
            proxy_pass http://vaultwarden:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Websocket support (fixes diagnostics warning)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Websocket notification hub — real-time vault sync between devices
        location /notifications/hub {
            proxy_pass http://vaultwarden:8080;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Websocket negotiation endpoint
        location /notifications/hub/negotiate {
            proxy_pass http://vaultwarden:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
